<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <!-- Content Security Policy: primary guard against XSS in user-supplied decks.
       `script-src 'self'` (no 'unsafe-inline') blocks inline event handlers such
       as <svg onload> / <img onerror> and javascript: URLs regardless of how the
       markup reaches the DOM. `object-src 'none'` blocks <object>/<embed>/<applet>
       and `base-uri 'self'` blocks <base> hijacking. Other resource types fall
       back to the permissive default-src so local/remote media keep working;
       `style-src` allows inline styles that Reveal and themes rely on. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: http: https: ws: wss:; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self';">
  <title>Loading...</title>
  <!-- This is a generic presentation stub. For markdown presentations you should do not need to modify this file.-->
  <link id="theme-stylesheet" rel="stylesheet" href="">
  <style type="text/css">
    body.hidden {
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      background: #000; /* avoid white flash */
      overflow: hidden; /* prevent scroll during load */
    }
    .reveal,
    .reveal * {
      -webkit-user-select: none;
      user-select: none;
    }
    /* Black cover overlay — starts opaque, fades out on deck.ready,
       and can be faded back in before closing via electronAPI.fadeToBlack() */
    #screen-cover {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 99999;
      pointer-events: none;
      opacity: 1;
      transition: opacity 800ms ease;
    }
    #screen-cover.faded-out {
      opacity: 0;
    }
  </style>
</head>
<body class="hidden">
  <div class="reveal">
    <div class="slides">
      <section id="markdown-container">Loading...</section>
    </div>
  </div>
  <div id="fixed-overlay-wrapper">
  </div>
  <div id="fixed-ai-wrapper">
  </div>
  <div id="fixed-tint-wrapper">
  </div>
  <!-- Invisible Audio Player -->
  <div id="screen-cover"></div>
  <audio id="background-audio-player" loop></audio>
  <script src="/js/translate.js"></script>
  <script src="/reveal-remote.js"></script>
  <script type="module" src="/js/presentations.js"></script>
</body>
</html>
